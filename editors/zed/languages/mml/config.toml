name = "MiniML"
# No tree-sitter grammar is bundled, so there's no syntax highlighting yet — the
# language still registers and the LSP attaches, giving diagnostics/hover/
# go-to-def/completion. (If a future Zed requires `grammar`, add one here.)
path_suffixes = ["mml"]
line_comments = ["-- "]
autoclose_before = ";:.,=}])>"
brackets = [
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false },
]
