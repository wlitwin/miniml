name = "MiniML"
grammar = "miniml"
path_suffixes = ["mml"]
line_comments = ["-- "]
autoclose_before = ";:.,=}])>"
brackets = [
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false },
]
