id = "miniml"
name = "MiniML"
version = "0.0.1"
schema_version = 1
authors = ["Walter Litwinczyk <walter@litwinczyk.com>"]
description = "MiniML language support — diagnostics, hover, go-to-definition and completion via `mml lsp`."

# Launch the in-MiniML language server. The command itself is returned by the
# extension code (src/lib.rs): it runs `mml lsp` from your $PATH.
[language_servers.mml]
name = "mml lsp"
languages = ["MiniML"]

# Tree-sitter grammar for syntax highlighting. Zed clones the grammar from a git
# repo at `rev`, then builds `<path>/src/parser.c`. The grammar lives in a
# subdirectory of THIS repo, so we point `repository` at the LOCAL checkout —
# this works without pushing anywhere. `rev` must be a commit that contains
# editors/tree-sitter-miniml/src/parser.c; bump it (git rev-parse HEAD) after you
# regenerate the grammar.
#
# To share with others, swap `repository` for the GitHub URL
# (https://github.com/wlitwin/miniml) and `rev` for a PUSHED commit.
[grammars.miniml]
repository = "file:///Users/walter/data/code/ocaml/interpreter"
rev = "adb527bd978f4e8a9620a9afd7341ebbd8796328"
path = "editors/tree-sitter-miniml"
